# Development override for docker-compose.yml
# Automatically loaded by Docker Compose
# Usage: docker-compose up (automatically merges with docker-compose.yml)

version: '3.8'

services:
  api:
    build:
      target: builder
    container_name: stellar_guilds_api_dev
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/stellar_guilds_dev?schema=public
      - REDIS_URL=redis://redis:6379
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "3000:3000"
      - "9229:9229"  # Debug port
    command: npm run start:dev
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Test database for e2e tests
  postgres-test:
    image: postgres:15-alpine
    container_name: stellar_guilds_postgres_test
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: stellar_guilds_test
    ports:
      - "5433:5432"
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - stellar-guilds-network

volumes:
  postgres_test_data:
